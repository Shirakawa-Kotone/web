<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>江西省高考录取数据查询</title>
<meta name="description" content="江西省2024-2025年高考录取数据查询，物理类 &amp; 历史类">
<meta name="theme-color" content="#39C5BB">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<script>(function(){try{var d=localStorage.getItem('dark_mode');if(d===null)d=window.matchMedia('(prefers-color-scheme:dark)').matches;else d=d==='true';if(d)document.documentElement.classList.add('dark-mode')}catch(e){}})();</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
:root{--primary:#39C5BB;--primary-dark:#2ea89f;--text:#1a1a2e;--text-secondary:#666;--bg:#f0f4f8;--card-bg:#fff;--card-shadow:0 4px 24px rgba(0,0,0,0.08);--card-hover-shadow:0 8px 40px rgba(0,0,0,0.12);--border:#e0e0e0}
:root.dark-mode{--primary:#66CCFF;--primary-dark:#55bbee;--text:#e0e0e0;--text-secondary:#aaa;--bg:#0f0f1a;--card-bg:#1a1a2e;--card-shadow:0 4px 24px rgba(0,0,0,0.3);--card-hover-shadow:0 8px 40px rgba(0,0,0,0.4);--border:#2a2a3e}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.header{text-align:center;margin-bottom:48px}
.header h1{font-size:28px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),#4a9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--text-secondary);font-size:15px;line-height:1.6}
.cards{display:flex;gap:24px;max-width:800px;width:100%}
.card{flex:1;background:var(--card-bg);border-radius:16px;padding:36px 28px;box-shadow:var(--card-shadow);text-decoration:none;color:var(--text);transition:all 0.25s ease;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;border:2px solid transparent}
.card:hover{box-shadow:var(--card-hover-shadow);transform:translateY(-4px)}
.card.physics:hover,.card.physics:focus{border-color:var(--primary)}
.card.history:hover,.card.history:focus{border-color:#f0a030}
.card-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px}
.card-icon.physics{background:rgba(57,197,187,0.12);color:var(--primary)}
.card-icon.history{background:rgba(240,160,48,0.12);color:#f0a030}
.card h2{font-size:20px;font-weight:600;margin-bottom:8px}
.card p{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:4px}
.card .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:12px}
.card .tag.physics{background:rgba(57,197,187,0.1);color:var(--primary)}
.card .tag.history{background:rgba(240,160,48,0.1);color:#f0a030}
.footer{text-align:center;margin-top:48px;font-size:12px;color:var(--text-secondary)}
.footer a{color:var(--primary);text-decoration:none}
.footer-links{display:flex;gap:16px;justify-content:center;margin-top:8px}
.footer-links a{color:var(--text-secondary);text-decoration:none;font-size:12px}
.footer-links a:hover{color:var(--primary)}
.dark-toggle{position:fixed;top:16px;right:16px;width:36px;height:36px;border-radius:8px;background:var(--card-bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:16px;box-shadow:var(--card-shadow);z-index:100;transition:all 0.2s}
.dark-toggle:hover{color:var(--primary)}
@media(max-width:640px){.header h1{font-size:22px}.header{margin-bottom:32px}.cards{flex-direction:column;gap:16px}.card{padding:28px 20px}}
</style>
</head>
<body>

<div class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="切换深色模式">
  <svg viewBox="0 0 24 24" width="1.2em" height="1.2em"><path fill="currentColor" d="M7.5 2c-1.79 1.15-3 3.18-3 5.5s1.21 4.35 3.03 5.5C4.46 13 2 10.54 2 7.5A5.5 5.5 0 0 1 7.5 2m11.57 1.5l1.43 1.43L4.93 20.5L3.5 19.07zm-6.18 2.43L11.41 5L9.97 6l.42-1.7L9 3.24l1.75-.12l.58-1.65L12 3.1l1.73.03l-1.35 1.13zm-3.3 3.61l-1.16-.73l-1.12.78l.34-1.32l-1.09-.83l1.36-.09l.45-1.29l.51 1.27l1.36.03l-1.05.87zM19 13.5a5.5 5.5 0 0 1-5.5 5.5c-1.22 0-2.35-.4-3.26-1.07l7.69-7.69c.67.91 1.07 2.04 1.07 3.26m-4.4 6.58l2.77-1.15l-.24 3.35zm4.33-2.7l1.15-2.77l2.2 2.54zm1.15-4.96l-1.14-2.78l3.34.24zM9.63 18.93l2.77 1.15l-2.53 2.19z"></path></svg>
</div>

<div class="header">
  <h1>江西省高考录取数据查询</h1>
  <p>2024&ndash;2025 年录取数据 &bull; 一分一段 &bull; 物理类 &bull; 历史类</p>
</div>

<div class="cards">
  <a class="card physics" href="physics/">
    <div class="card-icon physics">⚛</div>
    <h2>物理类</h2>
    <p>2024&ndash;2025 年物理类录取数据<br>22,472 条 &bull; 一分一段 &bull; 2026 招生计划</p>
    <span class="tag physics">选科：物化生/物化政/物化地&hellip;</span>
  </a>
  <a class="card history" href="history/">
    <div class="card-icon history">📜</div>
    <h2>历史类</h2>
    <p>2024&ndash;2025 年历史类录取数据<br>22,238 条 &bull; 一分一段 &bull; 2024 &bull; 2025</p>
    <span class="tag history">选科：历政地/历政生/历地生&hellip;</span>
  </a>
</div>

<div class="footer">
  <div class="footer-links">
    <a href="https://github.com/Shirakawa-Kotone/miniprogram-web" target="_blank" rel="noopener">GitHub</a>
    <a href="changelog/">更新日志</a>
  </div>
</div>

<script>
function toggleDark() {
  var html = document.documentElement;
  var isDark = html.classList.toggle('dark-mode');
  try { localStorage.setItem('dark_mode', isDark); } catch(e) {}
}
</script>

</body>
</html>
