<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>更新日志 — 江西高考录取数据查询</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">

<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #121212;
  color: #e0e0e0;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ===== Nav (dark) ===== */
.nav-bar {
  background: rgba(30,30,46,0.85); border-bottom-color: #333;
}
.nav-bar .brand { color: #fff; }
.nav-bar .brand small { color: #999; }
.nav-bar a { color: #66CCFF; }
.nav-bar a:hover { color: #99DDFF; }

/* ===== Dark Mode Colors ===== */
.section-title { border-bottom-color: #333; }
.version-marker { background: #0d2d3d; color: #66CCFF; }
.tag-feat { background: #0a2d2a; color: #39C5BB; }
.tag-fix { background: #2a1111; color: #ff6b6b; }
.tag-chore { background: #2a2a1a; color: #d4d44a; }
.tag-refactor { background: #0d1a3d; color: #66AAFF; }
code { background: #2a2a2a; color: #ccc; border-color: #333; }
blockquote {
  border-left-color: #66CCFF; color: #ddd;
  background: rgba(102,204,255,0.04);
}
.footer-link { color: #66CCFF; }
.footer-link:hover { color: #99DDFF; }
.back-top { background: rgba(102,204,255,0.18); color: #66CCFF; }
.back-top:hover { background: rgba(102,204,255,0.35); }
h1, h2, h3 { color: #fff; }
hr { border-top-color: #333; }
.loading { color: #999; }

/* ===== Nav ===== */
.nav-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(30,30,46,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid #333;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.nav-bar .brand {
  font-size: 15px; font-weight: 600; letter-spacing: 0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: #fff;
}
.nav-bar .brand small { font-weight: 400; font-size: 12px; color: #999; margin-left: 6px; }
.nav-bar .nav-links { display: flex; gap: 16px; flex-shrink: 0; }
.nav-bar a {
  text-decoration: none; color: #66CCFF; font-size: 14px; font-weight: 500;
  transition: color 0.2s;
}
.nav-bar a:hover { color: #99DDFF; }

/* ===== Container ===== */
.container {
  max-width: 820px; margin: 0 auto; padding: 40px 24px 80px;
  min-height: calc(100vh - 53px);
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 40px; }
}

/* ===== Markdown Content ===== */
h1 {
  font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.3px;
  color: #f0f0f0;
}
h1 + p {
  font-size: 15px; color: #39C5BB; line-height: 1.6; margin-bottom: 36px;
}
@media (max-width: 600px) {
  h1 { font-size: 24px; }
  h1 + p { margin-bottom: 24px; }
}

h2 {
  font-size: 22px; font-weight: 600; margin: 48px 0 8px;
  display: flex; align-items: center; gap: 12px;
  color: #39C5BB;
}
@media (max-width: 600px) { h2 { font-size: 19px; margin-top: 36px; } }

h3 {
  font-size: 17px; font-weight: 600; margin: 28px 0 12px;
  color: #66CCFF;
}
@media (max-width: 600px) { h3 { font-size: 15px; } }

hr {
  border: none; border-top: 1px solid #333; margin: 32px 0;
}

p { margin-bottom: 12px; }
ul, ol { margin: 8px 0 16px; padding-left: 22px; }
li { margin-bottom: 6px; }
li > ul { margin: 4px 0 4px; }

code {
  font-family: "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
  font-size: 0.88em; background: #2a2a2a; padding: 2px 7px;
  border-radius: 4px; border: 1px solid #333;
  color: #ccc;
}
pre { display: none; }

blockquote {
  border-left: 3px solid #66CCFF; padding: 8px 16px; margin: 16px 0;
  color: #ddd;
  background: rgba(102,204,255,0.04);
}

strong { font-weight: 600; }

/* ===== Version Marker ===== */
.version-marker {
  display: inline-block; font-size: 12px; font-weight: 500;
  background: #0d2d3d; color: #66CCFF; padding: 1px 10px; border-radius: 10px;
  vertical-align: middle;
}

/* ===== Tags ===== */
.tag {
  display: inline-block; font-size: 11px; font-weight: 500;
  padding: 1px 8px; border-radius: 4px; margin: 0 3px; letter-spacing: 0.3px;
}
.tag-feat { background: #0a2d2a; color: #39C5BB; }
.tag-fix { background: #2a1111; color: #ff6b6b; }
.tag-chore { background: #2a2a1a; color: #d4d44a; }
.tag-refactor { background: #0d1a3d; color: #66AAFF; }

/* ===== Section Title ===== */
.section-title {
  display: flex; align-items: center; gap: 10px;
  border-bottom: 2px solid #333; padding-bottom: 8px;
}

/* ===== Footer Link ===== */
.footer-link {
  display: inline-block; margin-top: 40px; font-size: 14px;
  color: #66CCFF; text-decoration: none; font-weight: 500;
}
.footer-link:hover { color: #99DDFF; text-decoration: underline; }

/* ===== Loading ===== */
.loading {
  text-align: center; padding: 80px 20px; color: #999;
}
.loading .spinner {
  width: 28px; height: 28px; border: 3px solid #333;
  border-top-color: #39C5BB;
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Error ===== */
.error {
  text-align: center; padding: 80px 20px; color: #e64340;
}
.error .icon { font-size: 40px; margin-bottom: 12px; }
.error p { font-size: 15px; }

/* ===== Back to Top ===== */
.back-top {
  position: fixed; bottom: 28px; right: 28px; z-index: 99;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(102,204,255,0.18); color: #66CCFF;
  border: none; cursor: pointer; opacity: 0; pointer-events: none;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.3s, background 0.2s; backdrop-filter: blur(4px);
}
.back-top.visible { opacity: 1; pointer-events: auto; }
.back-top:hover { background: rgba(102,204,255,0.35); }
.back-top svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<!-- Navigation -->
<nav class="nav-bar">
  <div class="brand">📋 更新日志 <small>江西高考录取数据查询</small></div>
  <div class="nav-links">
    <a href="../" class="nav-home">← 返回首页</a>
    <a href="https://github.com/Shirakawa-Kotone/miniprogram-web" target="_blank" rel="noopener">GitHub</a>
  </div>
</nav>

<!-- Content -->
<div class="container" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>加载更新日志中…</span>
  </div>
  <div class="error" id="error" style="display:none">
    <div class="icon">⚠️</div>
    <p>加载更新日志失败，请检查网络后刷新重试。</p>
  </div>
</div>

<!-- Back to Top -->
<button class="back-top" id="backTop" aria-label="返回顶部">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script>
(function() {
  const content = document.getElementById('content');
  const loading = document.getElementById('loading');
  const error = document.getElementById('error');
  const backBtn = document.getElementById('backTop');

  // Configure marked
  marked.setOptions({
    breaks: false,
    gfm: true,
  });

  // Markdown post-processing
  function enhanceHTML(html) {
    const div = document.createElement('div');
    div.innerHTML = html;

    // Version headings
    div.querySelectorAll('h2').forEach(h2 => {
      const match = h2.textContent.match(/^(v[\d.]+)[（(](\d{4}-\d{2}-\d{2})[）)]/);
      if (match) {
        const [_, ver, date] = match;
        const span = document.createElement('span');
        span.className = 'version-marker';
        span.textContent = ver;
        h2.innerHTML = '';
        h2.appendChild(span);
        h2.append(' ' + date);
        h2.classList.add('section-title');
      }
    });

    // Bold action words at line start
    div.querySelectorAll('li').forEach(li => {
      li.innerHTML = li.innerHTML.replace(
        /^(\s*(?:新增|添加|修复|优化|更新|重写|移除|删除|完善|改进|改\w+为|迁移|提取|同步|支持|扩展|默认|限制|解析|拆分为|采用|改用))(:?)/,
        (match) => `<strong>${match.trimStart()}</strong>${match.endsWith('：') ? '' : ' '}`
      );
    });

    // Inline tags
    div.innerHTML = div.innerHTML
      .replace(/`(\w+(?:feat|fix|chore|refactor)\w*)`/gi, (m, tag) => {
        if (/feat/i.test(tag)) return `<span class="tag tag-feat">${tag}</span>`;
        if (/fix/i.test(tag)) return `<span class="tag tag-fix">${tag}</span>`;
        if (/chore/i.test(tag)) return `<span class="tag tag-chore">${tag}</span>`;
        if (/refactor/i.test(tag)) return `<span class="tag tag-refactor">${tag}</span>`;
        return m;
      });

    return div.innerHTML;
  }

  // Fetch and render
  fetch('../CHANGELOG.md')
    .then(res => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.text();
    })
    .then(md => {
      const html = marked.parse(md);
      content.innerHTML = enhanceHTML(html);

      const footer = document.createElement('a');
      footer.href = '../';
      footer.className = 'footer-link';
      footer.textContent = '← 返回高考录取数据查询';
      content.appendChild(footer);
    })
    .catch(err => {
      console.error('Failed to load CHANGELOG.md:', err);
      loading.style.display = 'none';
      error.style.display = 'block';
    });

  // Back to top
  window.addEventListener('scroll', () => {
    backBtn.classList.toggle('visible', window.scrollY > 500);
  });
  backBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>
</body>
</html>
